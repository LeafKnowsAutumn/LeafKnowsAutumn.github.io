<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>炮门内战 — 工会对抗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=ZCOOLKuaiLe&display=swap');

:root {
  --bg: #080810;
  --surface: #10101c;
  --card: #16162a;
  --teamA: #00f0ff;
  --teamA-dim: rgba(0,240,255,0.12);
  --teamA-border: rgba(0,240,255,0.3);
  --teamB: #ff2d6a;
  --teamB-dim: rgba(255,45,106,0.12);
  --teamB-border: rgba(255,45,106,0.3);
  --text: #e0e0ff;
  --muted: #5a5a7a;
  --border: #1e1e3a;
  --win: #22c55e;
  --lose: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'ZCOOLKuaiLe', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
/* 背景分割线 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 50%;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.04), transparent);
  z-index: 0;
}
/* 左侧光晕 */
body::after {
  content: '';
  position: fixed;
  top: 0; left: -20%;
  width: 70%; height: 100%;
  background: radial-gradient(ellipse at 30% 50%, rgba(0,240,255,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ===== NAV ===== */
.nav {
  position: sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:6px;
  padding:12px 24px;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom:1px solid var(--border);
}
.nav-logo {
  font-family:'Orbitron',monospace; font-size:18px; font-weight:900;
  background: linear-gradient(135deg, var(--teamA), var(--teamB));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:2px; margin-right:16px;
}
.nav a {
  color: var(--muted); text-decoration:none; font-size:13px;
  padding:6px 14px; border-radius:6px; transition:all 0.2s; letter-spacing:1px;
}
.nav a:hover, .nav a.active { color:var(--teamA); background:var(--teamA-dim); }

/* ===== LAYOUT ===== */
.container { position:relative; z-index:2; max-width:1400px; margin:0 auto; padding:30px 24px 80px; }

/* ===== HERO / HEADER ===== */
.page-header { text-align:center; margin-bottom:32px; }
.page-title {
  font-family:'Orbitron',monospace; font-size:clamp(18px,3.5vw,30px); font-weight:900;
  letter-spacing:3px; margin-bottom:6px;
  background: linear-gradient(90deg, var(--teamA), #fff, var(--teamB));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.page-sub { font-size:13px; color:var(--muted); }

/* ===== SCOREBOARD 对比面板 ===== */
.scoreboard {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 0;
  margin-bottom: 36px;
  position: relative;
}
.score-team {
  padding: 24px 20px;
  border-radius: 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.score-teamA {
  background: linear-gradient(135deg, rgba(0,240,255,0.08), rgba(0,240,255,0.02));
  border: 1px solid var(--teamA-border);
}
.score-teamB {
  background: linear-gradient(135deg, rgba(255,45,106,0.08), rgba(255,45,106,0.02));
  border: 1px solid var(--teamB-border);
}
.score-team .team-name {
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px,2.5vw,20px);
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: text-shadow 0.2s;
}
.score-teamA .team-name { color: var(--teamA); }
.score-teamB .team-name { color: var(--teamB); }
.score-team .team-name:hover { text-shadow: 0 0 20px currentColor; }
.score-team .team-record {
  font-size: 13px; color: var(--muted); margin-bottom: 12px;
}
.score-team .team-score {
  font-family: 'Orbitron', monospace;
  font-size: clamp(36px,8vw,64px);
  font-weight: 900;
  line-height: 1;
}
.score-teamA .team-score { color: var(--teamA); text-shadow: 0 0 40px rgba(0,240,255,0.4); }
.score-teamB .team-score { color: var(--teamB); text-shadow: 0 0 40px rgba(255,45,106,0.4); }

/* VS 分隔 */
.score-vs {
  font-family: 'Orbitron', monospace;
  font-size: clamp(16px,3vw,28px);
  font-weight: 900;
  color: #333;
  padding: 0 16px;
  position: relative;
  z-index: 2;
}
.score-vs::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  z-index: -1;
}

/* ===== 届次栏 ===== */
.edition-bar {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background: var(--surface); padding:12px 18px; border-radius:10px;
  margin-bottom:20px; border:1px solid var(--border);
}
.edition-bar .label { color:var(--muted); font-size:12px; }
.ed-btn {
  padding:5px 14px; border-radius:20px;
  border:1px solid var(--border); background:transparent;
  color:var(--muted); cursor:pointer; font-size:12px; font-family:inherit;
  transition: all 0.2s;
}
.ed-btn:hover { background:var(--surface); }
.ed-btn.active { background:linear-gradient(135deg,var(--teamA),var(--teamB)); color:#000; border-color:transparent; font-weight:700; }
.ed-actions { margin-left:auto; display:flex; gap:8px; }
.btn-sm {
  padding:5px 12px; border-radius:6px; border:none;
  cursor:pointer; font-size:12px; font-family:inherit; transition:all 0.2s;
}
.btn-add { background:var(--teamA-dim); color:var(--teamA); border:1px solid var(--teamA-border); }
.btn-add:hover { background:var(--teamA-border); }
.btn-edit { background:rgba(255,200,0,0.1); color:#ffc800; border:1px solid rgba(255,200,0,0.3); }
.btn-del { background:rgba(255,50,50,0.1); color:var(--lose); border:1px solid rgba(255,50,50,0.3); }

/* ===== 录入区 ===== */
.input-section {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  margin-bottom:28px;
}
.section-heading {
  font-family:'Orbitron',monospace; font-size:13px; letter-spacing:2px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.section-heading::after { content:''; flex:1; height:1px; background:var(--border); }

/* 两队录入 */
.team-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
@media(max-width:768px){ .team-inputs { grid-template-columns:1fr; } }

.team-panel {
  border-radius: 12px;
  padding: 18px;
  position: relative;
}
.team-panelA {
  background: linear-gradient(160deg, rgba(0,240,255,0.06), transparent);
  border: 1px solid var(--teamA-border);
}
.team-panelB {
  background: linear-gradient(160deg, rgba(255,45,106,0.06), transparent);
  border: 1px solid var(--teamB-border);
}
.team-panel .panel-title {
  font-family:'Orbitron',monospace; font-size:12px; letter-spacing:2px;
  margin-bottom:14px;
}
.team-panelA .panel-title { color:var(--teamA); }
.team-panelB .panel-title { color:var(--teamB); }

/* 队员行 */
.player-row {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px; padding:8px 10px;
  background:rgba(255,255,255,0.02); border-radius:8px;
  border:1px solid transparent; transition:all 0.2s;
}
.player-row:hover { border-color:var(--border); }
.player-row input[type="text"] {
  flex:1; background:transparent; border:none; color:var(--text);
  font-size:13px; font-family:inherit; padding:4px 6px;
  border-bottom:1px solid var(--border); outline:none;
}
.player-row input[type="number"] {
  width:56px; background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:6px; color:var(--text); padding:4px 6px; font-size:12px;
  font-family:inherit; text-align:center; outline:none;
  -moz-appearance:textfield;
}
.player-row input[type="number"]::-webkit-inner-spin-button,
.player-row input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance:none; margin:0;
}
.player-row .remove-btn {
  background:transparent; border:none; color:var(--lose);
  cursor:pointer; font-size:14px; opacity:0.4; transition:opacity 0.2s;
}
.player-row .remove-btn:hover { opacity:1; }

.add-player-btn {
  display:block; width:100%; padding:14px;
  background:linear-gradient(135deg, var(--teamA-dim), var(--teamB-dim));
  border:2px solid var(--teamA-border);
  border-radius:10px; color:var(--teamA); cursor:pointer;
  font-size:14px; font-weight:700; font-family:inherit; transition:all 0.25s;
  letter-spacing:1px;
}
.add-player-btn:hover { border-color:var(--teamB); color:var(--teamB); transform:scale(1.03); box-shadow:0 0 25px rgba(0,240,255,0.2); }

/* 胜负选择 */
.result-row {
  display:flex; align-items:center; justify-content:center; gap:16px;
  margin:18px 0;
}
.result-btn {
  padding:10px 28px; border-radius:8px; border:2px solid var(--border);
  background:transparent; font-size:14px; font-family:inherit;
  cursor:pointer; transition:all 0.25s; font-weight:700;
  letter-spacing:1px;
}
.result-btnA { color:var(--teamA); }
.result-btnA.active, .result-btnA:hover { background:var(--teamA-dim); border-color:var(--teamA); box-shadow:0 0 20px rgba(0,240,255,0.2); }
.result-btnB { color:var(--teamB); }
.result-btnB.active, .result-btnB:hover { background:var(--teamB-dim); border-color:var(--teamB); box-shadow:0 0 20px rgba(255,45,106,0.2); }
.result-btnDraw { color:var(--muted); }
.result-btnDraw.active, .result-btnDraw:hover { background:rgba(255,255,255,0.06); border-color:#666; }

.submit-btn {
  display:block; width:100%; padding:12px;
  border:none; border-radius:10px; cursor:pointer;
  font-size:14px; font-family:inherit; font-weight:700;
  letter-spacing:2px; transition:all 0.25s; margin-top:12px;
  background: linear-gradient(135deg, var(--teamA), var(--teamB));
  color:#000;
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 6px 30px rgba(0,0,0,0.5); }

/* ===== 每局详情 ===== */
.rounds-section { margin-top:32px; }
.round-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:18px 20px; margin-bottom:12px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  transition:all 0.2s;
}
.round-card:hover { border-color:rgba(255,255,255,0.1); }
.round-result {
  padding:4px 12px; border-radius:20px; font-size:12px;
  font-weight:700; letter-spacing:1px;
}
.result-winA { background:var(--teamA-dim); color:var(--teamA); border:1px solid var(--teamA-border); }
.result-winB { background:var(--teamB-dim); color:var(--teamB); border:1px solid var(--teamB-border); }
.result-draw { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }
.round-teams { flex:1; font-size:13px; color:var(--text); }
.round-teams .vs { color:var(--muted); margin:0 6px; }
.round-time { font-size:11px; color:var(--muted); }
.round-del { background:transparent; border:none; color:var(--lose); cursor:pointer; font-size:13px; opacity:0.4; }
.round-del:hover { opacity:1; }

/* ===== EMPTY ===== */
.empty-state { text-align:center; padding:50px 20px; color:var(--muted); font-size:14px; }

/* ===== FOOTER ===== */
.footer {
  text-align:center; padding:40px 20px; border-top:1px solid var(--border);
  position:relative; z-index:2;
}
.footer-logo {
  font-family:'Orbitron',monospace; font-size:14px; font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(135deg,var(--teamA),var(--teamB));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.footer p { font-size:11px; color:var(--muted); letter-spacing:1px; }

/* ===== MODAL ===== */
.modal-mask {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; z-index:999;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.modal-mask.show { opacity:1; pointer-events:auto; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; width:92%; max-width:420px;
  transform:scale(0.95); transition:transform 0.25s;
}
.modal-mask.show .modal { transform:scale(1); }
.modal h3 { color:var(--teamA); font-size:15px; margin-bottom:16px; letter-spacing:1px; }
.modal label { color:var(--muted); font-size:12px; display:block; margin-bottom:4px; }
.modal input {
  width:100%; padding:9px 12px; background:var(--card); color:var(--text);
  border:1px solid var(--border); border-radius:8px; font-size:13px;
  font-family:inherit; outline:none; margin-bottom:14px; transition:border-color 0.2s;
}
.modal input:focus { border-color:var(--teamA); }
.modal .btn-row { display:flex; gap:10px; margin-top:14px; }
.modal .btn-row button { flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-family:inherit; font-weight:700; letter-spacing:1px; transition:all 0.2s; }
.modal .btn-confirm { background:var(--teamA); color:#000; }
.modal .btn-confirm:hover { box-shadow:0 0 20px var(--teamA-dim); }
.modal .btn-cancel { background:transparent; color:var(--muted); border:1px solid var(--border); }

/* ===== TOAST ===== */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--surface); color:var(--text); border:1px solid var(--teamA);
  border-radius:10px; padding:12px 24px; font-size:13px; z-index:9999;
  opacity:0; transition:all 0.3s; pointer-events:none;
  box-shadow:0 0 20px var(--teamA-dim);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

</div>

<!-- 修改队名弹窗 -->
<div class="modal-mask" id="nameModal" onclick="if(event.target===this)closeNameModal()">

      <button class="btn-cancel" onclick="closeNameModal()">取消</button>

</div>

<!-- 队员选择弹窗 -->
<div class="modal-mask" id="memberSelectModal" onclick="if(event.target===this)closeMemberSelectModal()">

    <h3>👥 选择工会成员</h3>
    <input type="text" id="memberSearch" placeholder="搜索成员..." oninput="renderMemberSelectList()" style="width:100%;margin-bottom:10px;padding:8px 10px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;">
    <div id="memberSelectList" style="max-height:40vh;overflow-y:auto;margin-bottom:14px;"></div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px;">➕ 自定义添加队员（不计入工会成员）：</label>

        <input type="text" id="customMemberInput" placeholder="输入队员名称" style="flex:1;padding:8px 10px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;">
        <button onclick="addCustomMember()" style="padding:6px 14px;background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3);border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">添加</button>

  </div>
</div>

<!-- 届次弹窗 -->
<div class="modal-mask" id="editionModal" onclick="if(event.target===this)closeEditionModal()">
  <div class="modal">
    <h3>🏟️ 新建内战届次</h3>
    <label>届次名称</label>
    <input type="text" id="edName" placeholder="例如：炮门内战第1届">
    <label>开始日期</label>
    <input type="date" id="edStart">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEditionModal()">取消</button>
      <button class="btn-confirm" onclick="createEdition()">创建</button>

  </div>
</div>

<div class="toast" id="toast"></div>

let sb = null;
let editions = [];      // 内战届次（type='internal'）
let curEd = null;
let rounds = [];
let inputPlayersA = [];
let inputPlayersB = [];
let currentResult = '';  // 'A' | 'B' | 'draw'
let editingTeam = '';    // 'A' | 'B'
let currentSelectTeam = ''; // 当前正在添加队员的队伍
let changePlayerIdx = null; // 更换模式：正在更换的队员索引
let changePlayerTeam = ''; // 更换模式：正在更换的队伍
let allMembersForInternal = []; // 工会成员缓存

/* ===== Supabase Init ===== */
async function loadScript(src){
  return new Promise((ok,err)=>{
    if(window.supabase){ok();return;}
    let s=document.createElement('script'); s.src=src;
    s.onload=ok; s.onerror=()=>err(new Error(src));
    document.head.appendChild(s);
  });
}
async function initSB(){
  try{
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if(!window.supabase) return false;
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  }catch(e){ return false; }
}

/* ===== 队名编辑 ===== */
function editTeamName(team){ editingTeam = team;
  document.getElementById('nameLabel').textContent = team==='A' ? '队 A 名称' : '队 B 名称';
  document.getElementById('inputTeamName').value = document.getElementById(team==='A'?'teamAName':'teamBName').textContent;
  document.getElementById('nameModal').classList.add('show');
}
function closeNameModal(){ document.getElementById('nameModal').classList.remove('show'); }
function saveTeamName(){
  let name = document.getElementById('inputTeamName').value.trim();
  if(!name) return;

  /* 届次改名模式 */
  if(window._pendingRenameId){
    let id = window._pendingRenameId;
    window._pendingRenameId = null;
    if(sb){
      sb.from('editions').update({name}).eq('id',id).then(r=>{
        if(!r.error){
          let ev = editions.find(e=>e.id===id);
          if(ev) ev.name = name;
          renderEditionBar();
          if(curEd===id){
            /* 更新 scoreboard 区标题（若有） */
          }
          toast('✅ 届次名称已更新');
        }
      });
    }
    closeNameModal();
    return;
  }

  let targetLabel = editingTeam==='A' ? 'teamAName' : 'teamBName';
  let targetPanel = editingTeam==='A' ? 'panelAName' : 'panelBName';
  let icon = editingTeam==='A' ? '⚡' : '🔥';
  document.getElementById(targetLabel).textContent = name;
  document.getElementById(targetPanel).textContent = icon+' '+name+' 队员';
  /* 保存到数据库 */
  if(sb && curEd){
    let field = editingTeam==='A' ? 'team_a_name' : 'team_b_name';
    sb.from('editions').update({[field]: name}).eq('id',curEd).then(r=>{
      if(!r.error) console.log('队名已保存',name);
    });
  }
  closeNameModal();
  toast('✅ 队名已更新');
}

/* ===== 队员管理 ===== */
function addPlayer(team){
  if(team==='A' && inputPlayersA.length>=16) return;
  if(team==='B' && inputPlayersB.length>=16) return;
  changePlayerIdx = null;
  showMemberSelectModal(team);
}
function removePlayer(team, idx){
  if(team==='A' && inputPlayersA.length>1) inputPlayersA.splice(idx,1);
  if(team==='B' && inputPlayersB.length>1) inputPlayersB.splice(idx,1);
  renderInputs();
}
function changePlayer(team, idx){
  changePlayerTeam = team;
  changePlayerIdx = idx;
  showMemberSelectModal(team, true);
}
function onPlayerInput(team, idx, field, val){
  if(team==='A'){
    inputPlayersA[idx][field] = field==='name' ? val : parseFloat(val)||0;
  }else{
    inputPlayersB[idx][field] = field==='name' ? val : parseFloat(val)||0;
  }
  renderInputs();
}

function renderInputs(){
  /* 队A */
  document.getElementById('playersA').innerHTML = inputPlayersA.map((p,i)=>`
    <div class="player-row">
      <span style="flex:1;color:var(--text);font-size:13px;padding:4px 6px;">${p.name||'未选择'}</span>
      <button style="padding:2px 8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;cursor:pointer;font-size:11px;" onclick="changePlayer('A',${i})">更换</button>
      <input type="number" placeholder="K" value="${p.k||''}" oninput="onPlayerInput('A',${i},'k',this.value)">
      <input type="number" placeholder="D" value="${p.d||''}" oninput="onPlayerInput('A',${i},'d',this.value)">
      <input type="number" placeholder="RT" value="${p.rt||''}" step="0.01" oninput="onPlayerInput('A',${i},'rt',this.value)" style="width:56px;text-align:center;">
      <button class="remove-btn" onclick="removePlayer('A',${i})">✕</button>
    </div>
  `).join('');
  /* 队B */
  document.getElementById('playersB').innerHTML = inputPlayersB.map((p,i)=>`
    <div class="player-row">
      <span style="flex:1;color:var(--text);font-size:13px;padding:4px 6px;">${p.name||'未选择'}</span>
      <button style="padding:2px 8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;cursor:pointer;font-size:11px;" onclick="changePlayer('B',${i})">更换</button>
      <input type="number" placeholder="K" value="${p.k||''}" oninput="onPlayerInput('B',${i},'k',this.value)">
      <input type="number" placeholder="D" value="${p.d||''}" oninput="onPlayerInput('B',${i},'d',this.value)">
      <input type="number" placeholder="RT" value="${p.rt||''}" step="0.01" oninput="onPlayerInput('B',${i},'rt',this.value)" style="width:56px;text-align:center;">
      <button class="remove-btn" onclick="removePlayer('B',${i})">✕</button>
    </div>
  `).join('');
}

/* ===== 胜负 ===== */
function setResult(r){
  currentResult = r;
  document.getElementById('btnWinA').classList.toggle('active', r==='A');
  document.getElementById('btnWinB').classList.toggle('active', r==='B');
  document.getElementById('btnDraw').classList.toggle('active', r==='draw');
}

/* ===== 提交 ===== */
async function submitRound(){
  if(!currentResult){ toast('⚠️ 请选择胜负结果'); return; }
  if(!curEd){ toast('⚠️ 请先选择或创建届次'); return; }
  let teamAName = document.getElementById('teamAName').textContent;
  let teamBName = document.getElementById('teamBName').textContent;
  let data = {
    teamA: { name:teamAName, players: inputPlayersA.filter(p=>p.name) },
    teamB: { name:teamBName, players: inputPlayersB.filter(p=>p.name) },
    result: currentResult,
    timestamp: new Date().toISOString()
  };
  if(!sb){ toast('❌ Supabase 未连接，请恢复项目后重试'); return; }
  try{
    let r = await sb.from('internal_rounds').insert([{edition_id:curEd, data}]).select();
    if(r.error) throw r.error;
    rounds.unshift(r.data[0]);
    renderRounds();
    updateScoreboard();
    /* 重置录入 */
    inputPlayersA = [{name:'',k:0,d:0,rt:0,adr:0}];
    inputPlayersB = [{name:'',k:0,d:0,rt:0,adr:0}];
    currentResult = '';
    setResult('');
    renderInputs();
    toast('✅ 本局已记录！');
  }catch(e){
    toast('❌ 提交失败：'+e.message);
  }
}

/* ===== 渲染对局 ===== */
function renderRounds(){
  let c = document.getElementById('roundsList');
  if(!rounds.length){ c.innerHTML = '<div class="empty-state">暂无对局记录，录入第一局吧！</div>'; return; }
  c.innerHTML = rounds.map((row,i)=>{
    let d = row.data || {};
    let result = d.result || '';
    let ev = editions.find(e=>e.id===curEd);
    let teamAName = d.teamA?.name||'队A';
    let teamBName = d.teamB?.name||'队B';
    // 若记录中为默认名称且届次有自定义名称，则显示自定义名称
    if(ev && ev.team_a_name && teamAName==='队A') teamAName = ev.team_a_name;
    if(ev && ev.team_b_name && teamBName==='队B') teamBName = ev.team_b_name;
    let teamAPlayers = d.teamA?.players||[];
    let teamBPlayers = d.teamB?.players||[];
    let resultClass = result==='A'?'result-winA':result==='B'?'result-winB':'result-draw';
    let teamAWins = result==='A' ? ' 🏆胜' : '';
    let teamBWins = result==='B' ? ' 🏆胜' : '';
    let time = row.created_at ? new Date(row.created_at).toLocaleString('zh-CN') : '';
    /* 队A选手详情：名字一行，K/D/RT一行 */
    let teamADetail = teamAPlayers.map(p=>{
      return `<div style="margin-bottom:4px;">
        <div style="font-size:12px;font-weight:600;color:var(--teamA);">${p.name||'?'}</div>
        <div style="font-size:11px;color:var(--muted);">K${p.k||0} / D${p.d||0} / RT${p.rt||0}</div>
      </div>`;
    }).join('');
    /* 队B选手详情 */
    let teamBDetail = teamBPlayers.map(p=>{
      return `<div style="margin-bottom:4px;">
        <div style="font-size:12px;font-weight:600;color:var(--teamB);">${p.name||'?'}</div>
        <div style="font-size:11px;color:var(--muted);">K${p.k||0} / D${p.d||0} / RT${p.rt||0}</div>
      </div>`;
    }).join('');
    /* 胜方区域高亮边框 */
    let aBorder = result==='A' ? 'border:1px solid rgba(0,240,255,0.5);box-shadow:0 0 12px rgba(0,240,255,0.15);' : 'border:1px solid rgba(0,240,255,0.1);';
    let bBorder = result==='B' ? 'border:1px solid rgba(255,45,106,0.5);box-shadow:0 0 12px rgba(255,45,106,0.15);' : 'border:1px solid rgba(255,45,106,0.1);';
    return `
      <div class="round-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span class="round-result ${resultClass}" style="font-size:14px;font-weight:700;">${teamAName}${teamAWins} VS ${teamBName}${teamBWins}</span>
          <span class="round-time" style="margin-left:auto;">${time}</span>
          <button class="round-del" onclick="deleteRound(${row.id})">🗑️</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:start;">
          <div style="padding:8px 12px;background:rgba(0,240,255,0.04);border-radius:8px;${aBorder}">
            <div style="font-size:12px;color:var(--teamA);font-weight:700;margin-bottom:6px;">${teamAName}${teamAWins}</div>
            ${teamADetail || '<div style="font-size:11px;color:var(--muted);">暂无队员</div>'}
          </div>
          <div style="display:flex;align-items:center;font-size:16px;color:var(--muted);padding:0 8px;">VS</div>
          <div style="padding:8px 12px;background:rgba(255,45,106,0.04);border-radius:8px;${bBorder}">
            <div style="font-size:12px;color:var(--teamB);font-weight:700;margin-bottom:6px;">${teamBName}${teamBWins}</div>
            ${teamBDetail || '<div style="font-size:11px;color:var(--muted);">暂无队员</div>'}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

/* ===== 计分板 ===== */
function updateScoreboard(){
  let sbEl = document.getElementById('scoreboard');
  if(!curEd){ sbEl.style.display='none'; return; }
  sbEl.style.display='grid';
  if(!rounds.length){
    document.getElementById('teamAScore').textContent = '0';
    document.getElementById('teamBScore').textContent = '0';
    document.getElementById('teamARecord').textContent = '0 胜 0 负';
    document.getElementById('teamBRecord').textContent = '0 胜 0 负';
    return;
  }
  let winsA=0, winsB=0, draws=0;
  rounds.forEach(r=>{
    let res = (r.data&&r.data.result)||'';
    if(res==='A') winsA++;
    else if(res==='B') winsB++;
    else draws++;
  });
  document.getElementById('teamAScore').textContent = winsA;
  document.getElementById('teamBScore').textContent = winsB;
  document.getElementById('teamARecord').textContent = `${winsA} 胜 ${rounds.length-winsA-draws} 负`;
  document.getElementById('teamBRecord').textContent = `${winsB} 胜 ${rounds.length-winsB-draws} 负`;
}

/* ===== 届次管理 ===== */
async function showNewEdition(){
  document.getElementById('edName').value = '炮门内战第'+(editions.length+1)+'届';
  document.getElementById('edStart').value = new Date().toISOString().slice(0,10);
  document.getElementById('editionModal').classList.add('show');
}
function closeEditionModal(){ document.getElementById('editionModal').classList.remove('show'); }
async function createEdition(){
  let name = document.getElementById('edName').value.trim();
  let start = document.getElementById('edStart').value;
  if(!name){ toast('⚠️ 请输入届次名称'); return; }
  if(!sb){ toast('❌ Supabase 未连接'); closeEditionModal(); return; }
  try{
    let defaultA = '队A', defaultB = '队B';
    let r = await sb.from('editions').insert([{name, start_date:start, type:'internal', team_a_name:defaultA, team_b_name:defaultB}]).select();
    if(r.error) throw r.error;
    editions.push(r.data[0]);
    renderEditionBar();
    switchEd(r.data[0].id);
    closeEditionModal();
    toast('✅ 届次已创建');
  }catch(e){
    toast('❌ 创建失败：'+(e.message||e));
  }
}
function renderEditionBar(){
  let c = document.getElementById('editionBtns');
  c.innerHTML = editions.map(ev=>`
    <span style="display:inline-flex;align-items:center;gap:4px;margin-right:6px;">
      <button class="ed-btn ${curEd===ev.id?'active':''}" onclick="switchEd(${ev.id})">${ev.name}</button>
      <button onclick="renameEdition(${ev.id},'${ev.name.replace(/'/g,'\\\'')}')" title="改名" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;">✏️</button>
      <button onclick="deleteEdition(${ev.id},'${ev.name.replace(/'/g,'\\\'')}')" title="删除届次" style="background:transparent;border:none;color:var(--lose);cursor:pointer;font-size:12px;padding:2px 4px;opacity:0.6;">🗑️</button>
    </span>
  `).join('');
}
async function switchEd(id){
  curEd = id;
  renderEditionBar();
  /* 从 editions 对象恢复队名 */
  let ev = editions.find(e=>e.id===id);
  if(ev){
    let aName = ev.team_a_name||'队A';
    let bName = ev.team_b_name||'队B';
    document.getElementById('teamAName').textContent = aName;
    document.getElementById('panelAName').textContent = '⚡ '+aName+' 队员';
    document.getElementById('teamBName').textContent = bName;
    document.getElementById('panelBName').textContent = '🔥 '+bName+' 队员';
  }
  await loadRounds();
  updateScoreboard();
}

async function loadRounds(){
  if(!sb||!curEd) return;
  try{
    let r = await sb.from('internal_rounds').select('*').eq('edition_id',curEd).order('id',{ascending:false});
    if(r.error) throw r.error;
    rounds = r.data||[];
    renderRounds();
  }catch(e){ console.warn(e); }
}

/* ===== 删除对局 ===== */
async function deleteRound(id){
  if(!confirm('确认删除本局记录？')) return;
  if(!sb) return;
  try{
    let r = await sb.from('internal_rounds').delete().eq('id',id);
    if(r.error) throw r.error;
    rounds = rounds.filter(x=>x.id!==id);
    renderRounds();
    updateScoreboard();
    toast('🗑️ 已删除');
  }catch(e){ toast('❌ 删除失败:'+e.message); }
}

/* ===== 届次管理：改名 / 删除 / 清空数据 ===== */
function renameEdition(id, curName){
  editingTeam = ''; // 复用队名弹窗
  document.getElementById('nameLabel').textContent = '届次名称';
  document.getElementById('inputTeamName').value = curName;
  document.getElementById('nameModal').classList.add('show');
  // 临时覆盖 saveTeamName 的逻辑
  window._pendingRenameId = id;
}
async function deleteEdition(id, name){
  if(!confirm('确认删除届次【'+name+'】？\n该届次下所有对局数据将一并删除！')) return;
  if(!sb) return;
  try{
    await sb.from('internal_rounds').delete().eq('edition_id', id);
    let r = await sb.from('editions').delete().eq('id', id);
    if(r.error) throw r.error;
    editions = editions.filter(e=>e.id!==id);
    if(curEd===id){
      curEd = editions.length ? editions[0].id : null;
      if(curEd) switchEd(curEd); else { rounds=[]; renderRounds(); updateScoreboard(); renderEditionBar(); }
    } else {
      renderEditionBar();
    }
    toast('🗑️ 届次【'+name+'】已删除');
  }catch(e){ toast('❌ 删除失败:'+e.message); }
}
async function clearEditionData(){
  if(!curEd){ toast('⚠️ 请先选择届次'); return; }
  let ev = editions.find(e=>e.id===curEd);
  let name = ev?ev.name:'';
  if(!confirm('确认清空【'+name+'】的所有对局数据？此操作不可恢复！')) return;
  if(!sb) return;
  try{
    let r = await sb.from('internal_rounds').delete().eq('edition_id',curEd);
    if(r.error) throw r.error;
    rounds = [];
    renderRounds();
    updateScoreboard();
    toast('🗑️ 本届数据已清空');
  }catch(e){ toast('❌ 清空失败:'+e.message); }
}

/* ===== Toast ===== */
function toast(msg){
  let t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

/* ===== INIT ===== */
async function init(){
  let ok = await initSB();
  if(ok){
    try{
      let r = await sb.from('editions').select('*').eq('type','internal').order('id',{ascending:false});
      if(!r.error){ editions = r.data||[]; renderEditionBar(); if(editions.length) switchEd(editions[0].id); }
    }catch(e){}
    loadMembersForInternal();
  }
  renderInputs();
}
/* ===== 工会成员选择 ===== */
async function loadMembersForInternal(){
  if(!sb) return;
  try{
    let r = await sb.from('members').select('id,name,avatar');
    if(r.error) throw r.error;
    allMembersForInternal = r.data || [];
  }catch(e){ console.warn('加载工会成员失败',e); }
}

window.showMemberSelectModal = function(team){
  currentSelectTeam = team;
  document.getElementById('memberSearch').value = '';
  renderMemberSelectList();
  document.getElementById('memberSelectModal').classList.add('show');
};

function renderMemberSelectList(){
  let list = document.getElementById('memberSelectList');
  let kw = (document.getElementById('memberSearch').value||'').trim().toLowerCase();
  let members = allMembersForInternal.filter(m=>{
    if(kw && !m.name.toLowerCase().includes(kw)) return false;
    // 已加入任一队中的成员不再显示
    let inA = inputPlayersA.find(p=>p.name===m.name);
    let inB = inputPlayersB.find(p=>p.name===m.name);
    return !inA && !inB;
  });
  if(!members.length){
    list.innerHTML = '<div style="color:var(--muted);padding:12px;text-align:center;">无匹配成员</div>';
    return;
  }
  /* 更换模式下只允许单选 */
  let isChange = (changePlayerIdx !== null);
  list.innerHTML = members.map(m=>{
    let radioAttr = isChange ? 'onchange="if(this.checked){document.querySelectorAll(\'#memberSelectList input\').forEach(c=>{if(c!==this)c.checked=false;});}"' : '';
    return '<label style="display:block;position:relative;padding:6px 8px 6px 32px;cursor:pointer;border-radius:4px;transition:background 0.15s;width:100%;box-sizing:border-box;">'
      + '<input type="checkbox" value="'+m.name+'" data-avatar="'+(m.avatar||'')+'" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);margin:0;" '+radioAttr+'>'
      + '<span style="font-size:13px;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+m.name+'</span>'
      + '</label>';
  }).join('');
}

window.closeMemberSelectModal = function(){
  document.getElementById('memberSelectModal').classList.remove('show');
};

window.addCustomMember = function(){
  let inp = document.getElementById('customMemberInput');
  let name = inp.value.trim();
  if(!name){ toast('⚠️ 请输入队员名称'); return; }
  let curList = currentSelectTeam==='A' ? inputPlayersA : inputPlayersB;
  if(curList.find(p=>p.name===name)){ toast('⚠️ 该队员已添加'); return; }
  curList.push({name, k:0, d:0, rt:0, adr:0});
  inp.value = '';
  renderInputs();
  toast('✅ 已添加自定义队员：'+name);
};

window.confirmMemberSelect = function(){
  let list = document.getElementById('memberSelectList');
  let checked = list.querySelectorAll('input[type="checkbox"]:checked');
  if(!checked.length){ toast('⚠️ 请至少选择一名队员'); return; }
  let curList = currentSelectTeam==='A' ? inputPlayersA : inputPlayersB;
  if(changePlayerIdx !== null && checked.length===1){
    /* 更换模式：替换指定位置 */
    let newName = checked[0].value;
    let newAvatar = checked[0].dataset.avatar||'';
    curList[changePlayerIdx] = {name:newName, avatar:newAvatar, k:0, d:0, rt:0, adr:0};
    toast('✅ 已更换队员：'+newName);
    changePlayerIdx = null;
    changePlayerTeam = '';
  } else {
    /* 正常添加模式 */
    checked.forEach(cb=>{
      curList.push({name:cb.value, avatar:cb.dataset.avatar||'', k:0, d:0, rt:0, adr:0});
    });
    toast('✅ 已添加 '+checked.length+' 名队员');
  }
  closeMemberSelectModal();
  renderInputs();
};

init();
</script>
</body>
</html>
