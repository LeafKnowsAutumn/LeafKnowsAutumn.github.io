<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>炮门演员争霸赛</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=ZCOOLKuaiLe&display=swap');

:root {
  --bg: #080810;
  --surface: #10101c;
  --card: #16162a;
  --teamA: #00f0ff;
  --teamA-dim: rgba(0,240,255,0.12);
  --teamA-border: rgba(0,240,255,0.3);
  --teamB: #ff2d6a;
  --teamB-dim: rgba(255,45,106,0.12);
  --teamB-border: rgba(255,45,106,0.3);
  --text: #e0e0ff;
  --muted: #5a5a7a;
  --border: #1e1e3a;
  --win: #22c55e;
  --lose: #ef4444;
  --yellow: #f0a500;
  --yellow-dim: rgba(240,165,0,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'ZCOOLKuaiLe', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 50%;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.04), transparent);
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: -20%;
  width: 70%; height: 100%;
  background: radial-gradient(ellipse at 30% 50%, rgba(0,240,255,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ===== NAV ===== */
.nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 6px;
  padding: 12px 24px;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 900;
  background: linear-gradient(135deg, var(--teamA), var(--teamB));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  margin-right: 16px;
}
.nav a {
  color: var(--muted); text-decoration: none;
  font-size: 13px; padding: 6px 14px;
  border-radius: 6px; transition: all 0.2s;
  letter-spacing: 1px;
}
.nav a:hover, .nav a.active {
  color: var(--teamA);
  background: var(--teamA-dim);
}

/* ===== LAYOUT ===== */
.container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; padding: 30px 24px 80px; }

/* ===== HEADER ===== */
.page-title {
  text-align: center;
  font-family: 'Orbitron', monospace;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.page-sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 20px; }

/* ===== STATUS BAR ===== */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  margin-bottom: 18px;
  font-size: 13px;
  color: var(--muted);
}
.wl-display { font-size: 13px; }
.wl-display .w { color: var(--win); font-weight: 700; }
.wl-display .d { color: var(--muted); font-weight: 700; }
.wl-display .l { color: var(--lose); font-weight: 700; }

/* ===== EDITION BAR ===== */
.edition-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 18px;
}
.edition-bar .label { color: var(--muted); font-size: 12px; flex-shrink: 0; }
.ed-btn {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; font-size: 12px; font-family: inherit;
  transition: all 0.2s;
}
.ed-btn:hover { background: var(--card); border-color: var(--teamA); color: var(--teamA); }
.ed-btn.active { background: linear-gradient(135deg, var(--teamA), #e03e50); color: #fff; border-color: transparent; font-weight: 700; box-shadow: 0 0 15px var(--teamA-dim); }
.ed-actions { margin-left: auto; display: flex; gap: 6px; }
.btn-sm {
  padding: 5px 12px; border-radius: 6px;
  border: none; cursor: pointer;
  font-size: 12px; font-family: inherit;
  transition: all 0.2s;
}
.btn-add { background: var(--teamA-dim); color: var(--teamA); border: 1px solid rgba(0,240,255,0.3); }
.btn-add:hover { background: rgba(255,70,85,0.2); }
.btn-actor { background: rgba(34,197,94,0.12); color: var(--win); border: 1px solid rgba(34,197,94,0.3); }
.btn-actor:hover { background: rgba(34,197,94,0.2); }

/* ===== SECTION TITLE ===== */
.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 13px; letter-spacing: 2px;
  color: var(--teamA); text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ===== RESULT SECTION ===== */
.result-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 22px;
}
/* ===== STAT TABLE ===== */
.stat-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.stat-table th {
  background: var(--card);
  color: var(--teamA);
  padding: 10px 8px;
  font-family: 'Orbitron', monospace;
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.stat-table td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.2s;
}
.stat-table tr:hover td { background: rgba(255,255,255,0.02); }
.avg-rt { color: var(--teamA); font-weight: 700; }
.avg-adr { color: var(--yellow); font-weight: 700; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 14px;
  background: var(--card);
  border-radius: 8px;
  margin-bottom: 14px;
  align-items: center;
}
.filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 14px;
  font-size: 11px; cursor: pointer; user-select: none;
  background: var(--card); color: var(--muted);
  border: 1px solid transparent;
  transition: all 0.2s; font-family: inherit;
}
.filter-chip:hover { border-color: var(--border); color: var(--text); }
.filter-chip.active { background: var(--teamA); color: #fff; border-color: var(--teamA); font-weight: 700; }
.filter-clear {
  font-size: 11px; color: var(--muted);
  background: transparent; border: none; cursor: pointer;
  padding: 2px 6px; font-family: inherit;
}
.filter-clear:hover { color: var(--teamA); }

/* ===== INPUT SECTION ===== */
.input-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 22px;
}
.input-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  margin-bottom: 16px;
}
.result-select {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card); color: var(--text);
  font-size: 13px; font-family: inherit;
  cursor: pointer; outline: none;
  transition: border-color 0.2s;
}
.result-select:focus { border-color: var(--teamA); }
.result-select option { background: var(--card); }
.add-actor-btn {
  padding: 6px 14px; border-radius: 8px;
  background: var(--teamA-dim); color: var(--win);
  border: 1px solid rgba(34,197,94,0.3);
  cursor: pointer; font-size: 12px; font-family: inherit;
  transition: all 0.2s;
}
.add-actor-btn:hover { background: rgba(34,197,94,0.2); }

/* ===== PLAYER CARDS ===== */
.player-inputs { display: flex; gap: 10px; flex-wrap: wrap; }
.player-card {
  flex: 1; min-width: 130px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px 10px;
  text-align: center;
  position: relative;
  transition: all 0.25s;
}
.player-card:hover { border-color: rgba(0,240,255,0.3); transform: translateY(-2px); }
.card-del {
  position: absolute; top: 6px; right: 8px;
  background: transparent; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 13px; opacity: 0.4; transition: all 0.2s;
  line-height: 1;
}
.card-del:hover { opacity: 1; color: var(--lose); }
.player-avatar {
  width: 48px; height: 48px;
  border-radius: 50%; object-fit: cover;
  border: 2px solid var(--teamA);
  display: block; margin: 0 auto 8px;
  transition: border-color 0.3s;
}
.player-card:hover .player-avatar { border-color: var(--teamA-border); }
.player-name {
  color: var(--teamA); font-weight: 700;
  font-size: 12px; margin-bottom: 6px;
}
.input-group {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 4px;
}
.input-group label {
  width: 28px; font-size: 10px; color: var(--muted);
  text-align: left; flex-shrink: 0;
}
.input-group input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text); padding: 5px 6px;
  font-size: 12px; font-family: inherit;
  text-align: center; outline: none;
  transition: border-color 0.2s;
  -moz-appearance: textfield;
}
.input-group input:focus { border-color: var(--teamA); }
.input-group input::-webkit-outer-spin-button,
.input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ===== BUTTONS ===== */
.btn-group { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-family: inherit;
  cursor: pointer; border: none;
  transition: all 0.25s; letter-spacing: 0.5px;
}
.btn-submit {
  flex: 1;
  background: linear-gradient(135deg, var(--teamA), #e03e50);
  color: #fff; font-weight: 700;
  box-shadow: 0 0 20px var(--teamA-dim);
}
.btn-submit:hover { box-shadow: 0 0 35px var(--teamA-dim); transform: translateY(-1px); }
.btn-reset { background: rgba(100,100,120,0.15); color: var(--muted); border: 1px solid var(--border); }
.btn-reset:hover { background: rgba(100,100,120,0.25); color: var(--text); }
.btn-clear { background: rgba(239,68,68,0.1); color: var(--lose); border: 1px solid rgba(239,68,68,0.3); }
.btn-clear:hover { background: rgba(239,68,68,0.2); }

/* ===== ROUND DETAIL ===== */
.round-detail { margin-bottom: 22px; }
.round-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all 0.2s;
}
.round-item:hover { border-color: rgba(255,255,255,0.08); }
.round-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.round-title { color: var(--teamA); font-weight: 700; font-size: 13px; }
.win-badge {
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
}
.win-badge.win { background: var(--teamA-dim); color: var(--win); border: 1px solid rgba(34,197,94,0.3); }
.win-badge.lose { background: rgba(239,68,68,0.1); color: var(--lose); border: 1px solid rgba(239,68,68,0.3); }
.win-badge.draw { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
.round-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
  gap: 5px; text-align: center; font-size: 11px;
}
.round-grid .cell-name { color: var(--teamA); font-size: 11px; }
.round-grid .cell-kda { color: var(--text); }
.round-grid .cell-rt { color: var(--muted); font-size: 10px; }
.round-grid .cell-adr { color: var(--yellow); font-size: 10px; }
.round-del {
  background: transparent; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 12px; opacity: 0.4; transition: all 0.2s;
}
.round-del:hover { opacity: 1; color: var(--lose); }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }

/* ===== MODAL ===== */
.modal-mask {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-mask.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 26px;
  width: 92%; max-width: 520px;
  max-height: 85vh; overflow-y: auto;
  transform: scale(0.95) translateY(10px);
  transition: transform 0.25s;
}
.modal-mask.show .modal { transform: scale(1) translateY(0); }
.modal h3 { color: var(--teamA); font-size: 15px; margin-bottom: 18px; letter-spacing: 1px; }
.modal label { color: var(--muted); font-size: 12px; display: block; margin-bottom: 4px; }
.modal input, .modal select {
  width: 100%; padding: 9px 12px;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color 0.2s; margin-bottom: 14px;
}
.modal input:focus, .modal select:focus { border-color: var(--teamA); box-shadow: 0 0 10px var(--teamA-dim); }
.modal .row { display: flex; gap: 12px; }
.modal .row > * { flex: 1; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal .btn-confirm {
  flex: 1; padding: 10px; border-radius: 8px;
  background: var(--teamA); color: #fff;
  border: none; cursor: pointer;
  font-size: 13px; font-family: inherit; font-weight: 700;
  letter-spacing: 1px; transition: all 0.2s;
}
.modal .btn-confirm:hover { box-shadow: 0 0 20px var(--teamA-dim); }
.modal .btn-cancel {
  flex: 1; padding: 10px; border-radius: 8px;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); cursor: pointer;
  font-size: 13px; font-family: inherit; transition: all 0.2s;
}
.modal .btn-cancel:hover { color: var(--text); border-color: #888; }

/* Actor list modal */
.actor-list { max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
.actor-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
}
.actor-row:hover { background: var(--card); }
.actor-row input[type="checkbox"] { accent-color: var(--win); width: 16px; height: 16px; }
.actor-row.disabled { opacity: 0.4; cursor: not-allowed; }
.actor-row .name { font-size: 13px; color: var(--text); }
.actor-row.disabled .name { color: #666; }
.actor-custom-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 12px;
}
.actor-custom-row input {
  flex: 1; padding: 8px 10px;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.actor-custom-row input:focus { border-color: var(--teamA); }
.save-check {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 14px; color: var(--muted); font-size: 12px;
}
.save-check input[type="checkbox"] { accent-color: var(--win); width: 16px; height: 16px; }

/* ===== FOOTER ===== */
.footer {
  text-align: center; padding: 40px 20px;
  border-top: 1px solid var(--border);
  position: relative; z-index: 2;
}
.footer-logo {
  font-family: 'Orbitron', monospace;
  font-size: 14px; font-weight: 900;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--teamA), var(--teamB));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.footer p { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface); color: var(--text);
  border: 1px solid var(--teamA);
  border-radius: 10px; padding: 12px 24px;
  font-size: 13px; z-index: 9999;
  opacity: 0; transition: all 0.3s; pointer-events: none;
  box-shadow: 0 0 20px var(--teamA-dim);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .player-card { min-width: calc(50% - 5px); }
  .round-grid { grid-template-columns: repeat(3, 1fr); }
}
@media(max-width:480px){
  .player-card { min-width: 100%; }
  .nav { padding: 10px 12px; gap: 4px; }
  .nav a { font-size: 11px; padding: 5px 8px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">PAOMEN</div>
  <a href="index.html">炮门</a>
  <a href="Gamers.html">工会成员</a>
  <a href="Actor_Online.html" class="active">天梯奥斯卡</a>
  <a href="internal.html">炮门内战</a>
</nav>

<div class="container">

  <!-- HEADER -->
  <h1 class="page-title" id="mainTitle">🔥 炮门演员争霸赛</h1>
  <div class="page-sub" id="edTimeDisplay" style="display:none;"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="info">共 <b id="roundCount">0</b> 局数据</span>
    <span class="wl-display">战绩：<span class="w" id="winCount">0</span> 胜 <span class="d" id="drawCount">0</span> 平 <span class="l" id="loseCount">0</span> 负</span>
    <span class="info" id="lastUpdate">等待数据加载...</span>
  </div>

  <!-- EDITION BAR -->
  <div class="edition-bar" id="editionBar">
    <span class="label">届次：</span>
    <span id="editionBtns"></span>
    <div class="ed-actions">
      <button class="btn-sm btn-add" onclick="showNewEdition()">＋ 新建</button>
      <button class="btn-sm btn-actor" onclick="showActorMgr()">🤡 演员库</button>
    </div>
  </div>

  <!-- RESULT SECTION (stat table) -->
  <div class="result-section">
    <div class="section-title">🤡 演员实力表</div>
    <div class="filter-bar" id="filterBar"></div>
    <div style="overflow-x:auto;">
      <table class="stat-table">
        <thead><tr>
          <th>排名</th><th>演员</th><th>总K</th><th>总D</th><th>平均ADR</th><th>平均RT</th><th>局数</th>
        </tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ROUND DETAIL -->
  <div class="round-detail" id="logsSection">
    <div class="section-title">📋 每局数据详情</div>
    <div id="loading" style="text-align:center;padding:40px;color:var(--teamA);font-size:14px;">正在加载数据...</div>
    <div id="roundsList"></div>
  </div>

  <!-- INPUT SECTION -->
  <div class="input-section">
    <div class="input-header">
      <div class="section-title" style="margin:0;">🖊️ 录入本局数据</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <select class="result-select" id="roundResult">
          <option value="">胜负</option>
          <option value="win">🏆 胜</option>
          <option value="draw">🤝 平</option>
          <option value="lose">💀 负</option>
        </select>
        <button class="add-actor-btn" onclick="showAddActorModal()">＋ 添加演员</button>
      </div>
    </div>
    <div id="inputInfo" style="color:var(--muted);font-size:12px;margin-bottom:10px;"></div>
    <div class="player-inputs" id="playerInputs"></div>
    <div class="btn-group">
      <button class="btn btn-submit" id="addBtn">✅ 提交本局</button>
      <button class="btn btn-clear" id="clearBtn">🗑️ 清空全部</button>
    </div>
  </div>

</div>

<!-- EDITION MODAL -->
<div class="modal-mask" id="editionModal">
  <div class="modal">
    <h3>🏆 新建届次</h3>
    <label>届次名称</label>
    <input id="edName" placeholder="例如：2026炮门第X届演员争霸赛">
    <div class="row">
      <div><label>开始时间</label><input id="edStart" type="date"></div>
      <div><label>结束时间</label><input id="edEnd" type="date"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEditionModal()">取消</button>
      <button class="btn-confirm" onclick="createEdition()">创建</button>
    </div>
  </div>
</div>

<!-- ACTOR MANAGER MODAL -->
<div class="modal-mask" id="actorModal">

function calcRT(k,d){ if(!d) return k; return parseFloat((k/d).toFixed(2)); }

/* ===== SUPABASE ===== */
async function loadScript(src){
  return new Promise((ok,err)=>{
    if(window.supabase){ok();return;}
    let s=document.createElement('script'); s.src=src;
    s.onload=ok; s.onerror=()=>err(new Error(src)); document.head.appendChild(s);
  });
}
async function initSB(){
  try{
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if(!window.supabase) return false;
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  }catch(e){ return false; }
}

/* ===== OSCAR ===== */
async function computeOscarWinners(){
  oscarWinners = {};
  for(let i=0; i<editions.length; i++){
    let ed = editions[i];
    let r = await sb.from('rounds').select('data').eq('edition_id', ed.id);
    if(r.error || !r.data.length) continue;
    let actorStats = {};
    r.data.forEach(function(row){
      (row.data||[]).forEach(function(p){
        let n = p.name || '';
        if(!n) return;
        if(!actorStats[n]) actorStats[n] = {rt:0, count:0};
        actorStats[n].rt += p.rt||0;
        actorStats[n].count++;
      });
    });
    let minRt = Infinity, winner = '';
    for(let n in actorStats){
      let avg = actorStats[n].rt / actorStats[n].count;
      if(avg < minRt){ minRt = avg; winner = n; }
    }
    if(winner){
      oscarWinners[ed.id] = {name:winner, avgRt:minRt, editionName:ed.name};
    }
  }
}

/* ===== EDITION ===== */
async function loadEditions(){
  let r = await sb.from('editions').select('*').eq('type','actor').order('id',{ascending:false});
  if(r.error) return;
  editions = r.data || [];
  renderEditionBar();
  await computeOscarWinners();
  if(editions.length){ switchEd(editions[0].id); }
  else { showNewEdition(); }
}

function renderEditionBar(){
  let c = document.getElementById('editionBtns');
  c.innerHTML = '';
  editions.forEach(function(ev){
    let wrap = document.createElement('div');
    wrap.style.cssText = 'display:inline-flex;align-items:center;margin-right:4px;';
    let b = document.createElement('button');
    b.className = 'ed-btn' + (curEd && curEd.id===ev.id?' active':'');
    b.textContent = ev.name.replace('2026炮门','').replace('演员争霸赛','');
    b.onclick = function(){ switchEd(ev.id); };
    wrap.appendChild(b);
    let editBtn = document.createElement('button');
    editBtn.className = 'ed-edit-btn';
    editBtn.textContent = '✏️';
    editBtn.title = '重命名';
    editBtn.style.cssText = 'background:transparent;border:none;cursor:pointer;padding:2px 3px;font-size:11px;opacity:0.5;transition:opacity .2s;color:var(--muted);';
    editBtn.onmouseover = ()=>{editBtn.style.opacity='1';};
    editBtn.onmouseout = ()=>{editBtn.style.opacity='0.5';};
    editBtn.onclick = function(e){ e.stopPropagation(); editEdition(ev.id); };
    wrap.appendChild(editBtn);
    let delBtn = document.createElement('button');
    delBtn.className = 'ed-delete-btn';
    delBtn.textContent = '🗑️';
    delBtn.title = '删除';
    delBtn.style.cssText = 'background:transparent;border:none;cursor:pointer;padding:2px 3px;font-size:11px;opacity:0.5;transition:opacity .2s;color:var(--muted);';
    delBtn.onmouseover = ()=>{delBtn.style.opacity='1';delBtn.style.color='var(--lose)';};
    delBtn.onmouseout = ()=>{delBtn.style.opacity='0.5';delBtn.style.color='var(--muted)';};
    delBtn.onclick = function(e){ e.stopPropagation(); deleteEdition(ev.id); };
    wrap.appendChild(delBtn);
    c.appendChild(wrap);
  });
}

async function switchEd(id){
  let ev = editions.find(function(e){ return e.id===id; });
  if(!ev) return;
  curEd = ev;
  actorLibNames = (ev.players && ev.players.length) ? ev.players.slice() : [];
  let r = await sb.from('rounds').select('id,data,created_at,result').eq('edition_id',id).order('id');
  if(r.error){
    rounds=[];
  }else{
    rounds = (r.data||[]).map(function(row){ return {id:row.id, data:row.data, created_at:row.created_at, result:row.result||''}; });
  }
  document.getElementById('mainTitle').textContent = '🔥 ' + ev.name;
  let timeStr = (ev.start_date||'') + (ev.end_date?' ~ '+ev.end_date:'');
  let timeEl = document.getElementById('edTimeDisplay');
  if(timeStr){
    timeEl.style.display = 'block';
    timeEl.textContent = timeStr;
  }else{
    timeEl.style.display = 'none';
  }
  renderEditionBar();
  inputActors = [];
  renderInputs();
  renderAll();
  document.getElementById('lastUpdate').textContent = '最后更新 '+new Date().toLocaleTimeString('zh-CN');
}

function showNewEdition(){
  document.getElementById('edName').value = '2026炮门第'+(editions.length+1)+'届演员争霸赛';
  document.getElementById('edStart').value = new Date().toISOString().slice(0,10);
  document.getElementById('edEnd').value = '';
  document.getElementById('editionModal').classList.add('show');
}
function closeEditionModal(){ document.getElementById('editionModal').classList.remove('show'); }

async function createEdition(){
  let name = document.getElementById('edName').value.trim();
  let start = document.getElementById('edStart').value;
  let end = document.getElementById('edEnd').value;
  if(!name){ toast('⚠️ 请输入名称'); return; }
  let r = await sb.from('editions').insert([{name:name, start_date:start, end_date:end, players:[], type:'actor'}]).select();
  if(r.error){ toast('❌ 创建失败:'+r.error.message); return; }
  editions.push(r.data[0]);
  closeEditionModal();
  switchEd(r.data[0].id);
  toast('✅ 届次已创建');
}

async function editEdition(id){
  let ev = editions.find(function(e){ return e.id===id; });
  if(!ev) return;
  let newName = prompt('重命名届次：', ev.name);
  if(!newName || newName.trim()==='') return;
  newName = newName.trim();
  let r = await sb.from('editions').update({name:newName}).eq('id', id);
  if(r.error){ toast('❌ 重命名失败'); return; }
  ev.name = newName;
  if(curEd && curEd.id===id) document.getElementById('mainTitle').textContent = '🔥 ' + newName;
  renderEditionBar();
  toast('✅ 已重命名');
}

async function deleteEdition(id){
  let ev = editions.find(function(e){ return e.id===id; });
  if(!ev) return;
  if(!confirm('删除届次《'+ev.name+'》？\n该届次下的所有对局将同时删除！')) return;
  if(!confirm('再次确认删除？此操作不可撤销！')) return;
  let r1 = await sb.from('rounds').delete().eq('edition_id', id);
  if(r1.error){ toast('❌ 删除对局失败'); return; }
  let r2 = await sb.from('editions').delete().eq('id', id);
  if(r2.error){ toast('❌ 删除届次失败'); return; }
  editions = editions.filter(function(e){ return e.id!==id; });
  rounds = rounds.filter(function(rd){ return rd.edition_id!==id; });
  if(curEd && curEd.id===id){
    if(editions.length){ switchEd(editions[0].id); }
    else { curEd=null; rounds=[]; renderAll(); showNewEdition(); }
  }
  renderEditionBar();
  toast('🗑️ 已删除《'+ev.name+'》');
}

/* ===== ACTOR MANAGER ===== */
let allMembersForActor = [];  // 工会成员缓存
let actorLibNames = [];    // 本届参演演员名字列表（对应 editions.players）

async function showActorMgr(){
  let list = document.getElementById('actorList');
  list.innerHTML = '加载中...';
  document.getElementById('actorModal').classList.add('show');

  // 加载工会成员
  if(!sb) { list.innerHTML = '⚠️ Supabase 未连接'; return; }
  try {
    let r = await sb.from('members').select('id,name,avatar');
    if(r.error) throw r.error;
    allMembersForActor = r.data || [];
  } catch(e) {
    list.innerHTML = '⚠️ 加载工会成员失败：'+e.message; return;
  }

  renderActorList();
}
window.showActorMgr = showActorMgr;
function closeActorModal(){ document.getElementById('actorModal').classList.remove('show'); }

function renderActorList(){
  let list = document.getElementById('actorList');
  if(!allMembersForActor.length && !actorLibNames.filter(n=>!allMembersForActor.find(m=>m.name===n)).length){
    list.innerHTML = '<div style="color:var(--muted);padding:16px;">暂无工会成员，请先在工会成员页面添加</div>';
    return;
  }
  let html = '';
  // 工会成员
  allMembersForActor.forEach(m => {
    let checked = actorLibNames.includes(m.name) ? 'checked' : '';
    html += `<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-radius:6px;transition:background 0.15s;"
                   onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='transparent'">
      <input type="checkbox" value="${m.name}" ${checked} onchange="onActorCheck(this)">
      <img src="${m.avatar||DEFAULT_AVATAR}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border);" onerror="this.src='${DEFAULT_AVATAR}'">
      <span style="font-size:13px;color:var(--text);">${m.name}</span>
    </label>`;
  });
  // 自定义演员（不在工会成员里的）
  let customNames = actorLibNames.filter(n=>!allMembersForActor.find(m=>m.name===n));
  if(customNames.length){
    html += `<div style="margin-top:10px;padding:6px 10px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);">自定义演员（不计入工会成员）：</div>`;
    customNames.forEach(n=>{
      html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;">
        <span style="font-size:13px;color:var(--neon-yellow);flex:1;">${n}</span>
        <button onclick="removeCustomActor('${n.replace(/'/g,'\\\'')}')" style="background:none;border:1px solid rgba(0,240,255,0.3);color:#00f0ff;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;">删除</button>
      </div>`;
    });
  }
  list.innerHTML = html;
}

function removeCustomActor(name){
  actorLibNames = actorLibNames.filter(n=>n!==name);
  renderActorList();
  toast('🗑️ 已移除自定义演员：'+name);
}

function onActorCheck(cb){
  if(cb.checked){
    if(!actorLibNames.includes(cb.value)) actorLibNames.push(cb.value);
  } else {
    actorLibNames = actorLibNames.filter(n=>n!==cb.value);
  }
}

async function addCustomActor(){
  let inp = document.getElementById('customActorInput');
  let name = inp.value.trim();
  if(!name){ toast('⚠️ 请输入演员名称'); return; }
  if(actorLibNames.includes(name)){ toast('⚠️ 该演员已存在'); return; }
  actorLibNames.push(name);
  inp.value = '';
  renderActorList();
  toast('✅ 已添加自定义演员：'+name+'（不计入工会成员）');
}

async function saveActors(){
  if(!actorLibNames.length){ toast('⚠️ 请至少选择一名演员'); return; }
  if(!curEd){ toast('⚠️ 请先选择届次'); return; }
  // 只保存到 editions.players，不写回 members 表
  try {
    let r = await sb.from('editions').update({ players:actorLibNames }).eq('id', curEd.id);
    if(r.error) throw r.error;
    curEd.players = actorLibNames;
    // 同步头像（从工会成员中查找）
    let avs = [];
    actorLibNames.forEach(n=>{
      let m = allMembersForActor.find(x=>x.name===n);
      avs.push(m ? (m.avatar||DEFAULT_AVATAR) : DEFAULT_AVATAR);
    });
    await sb.from('editions').update({ avatars:avs }).eq('id', curEd.id);
    curEd.avatars = avs;
  } catch(e){
    toast('❌ 保存失败：'+e.message); return;
  }
  // 同步到 inputActors
  inputActors = actorLibNames.map((n,i)=>({name:n, avatar:(curEd.avatars&&curEd.avatars[i])||DEFAULT_AVATAR}));
  closeActorModal();
  renderInputs();
  renderAll();
  toast('✅ 演员资料库已保存（本届 '+actorLibNames.length+' 名演员）');
}
window.saveActors = saveActors;
window.addCustomActor = addCustomActor;

/* ===== ADD ACTOR TO INPUT ===== */
window.closeAddActorModal = function(){ document.getElementById('addActorModal').classList.remove('show'); };
window.showAddActorModal = function(){
  let list = document.getElementById('actorCheckList');
  list.innerHTML = '';
  if(!allMembersForActor.length){
    list.innerHTML = '<div style="color:var(--muted);padding:12px;">⚠️ 工会成员数据为空，请先在「工会成员」页面添加成员</div>';
    document.getElementById('addActorModal').classList.add('show');
    return;
  }
  allMembersForActor.forEach(function(m){
    let already = inputActors.find(function(a){ return a.name===m.name; });
    let item = document.createElement('label');
    item.style.cssText = 'display:block;position:relative;padding:6px 8px 6px 32px;cursor:pointer;border-radius:4px;transition:background 0.15s;width:100%;box-sizing:border-box;'+(already?'opacity:0.4;cursor:not-allowed;':'');
    item.innerHTML = '<input type="checkbox" value="'+m.name+'" data-avatar="'+(m.avatar||DEFAULT_AVATAR)+'" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);margin:0;" '+(already?'disabled checked':'')+'>'
      + '<span style="font-size:13px;color:'+(already?'#888':'var(--text)')+';display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+m.name+'</span>'
      + (already?' <span style="color:#888;font-size:11px;position:absolute;right:8px;top:50%;transform:translateY(-50%);">（已添加）</span>':'');
    if(!already){
      item.onmouseover = function(){ this.style.background='rgba(255,255,255,0.04)'; };
      item.onmouseout = function(){ this.style.background='transparent'; };
    }
    list.appendChild(item);
  });
  document.getElementById('customActorName').value = '';
  document.getElementById('addActorModal').classList.add('show');
};

window.confirmAddActors = async function(){
  let list = document.getElementById('actorCheckList');
  let checked = list.querySelectorAll('input[type="checkbox"]:checked:not(:disabled)');
  let added = [];
  checked.forEach(function(cb){
    let n = cb.value;
    if(inputActors.find(function(a){ return a.name===n; })) return;
    let avatar = cb.dataset.avatar || DEFAULT_AVATAR;
    inputActors.push({name:n, avatar:avatar});
    added.push(n);
  });
  if(!added.length){ toast('⚠️ 请选择要添加的演员'); return; }
  document.getElementById('addActorModal').classList.remove('show');
  renderInputs();
  toast('✅ 已添加 '+added.length+' 名演员');
};

window.confirmAddCustomActor = async function(){
  let customName = document.getElementById('customActorName').value.trim();
  if(!customName){ toast('⚠️ 请输入演员名称'); return; }
  if(!inputActors.find(function(a){ return a.name===customName; })){
    inputActors.push({name:customName, avatar:DEFAULT_AVATAR});
  }
  document.getElementById('addActorModal').classList.remove('show');
  renderInputs();
  toast('✅ 已添加自定义演员：'+customName);
};

/* ===== INPUT RENDER ===== */
function renderInputs(){
  let c = document.getElementById('playerInputs');
  c.innerHTML = inputActors.map(function(actor,i){
    return '<div class="player-card" data-idx="'+i+'">'
      + '<button class="card-del" onclick="removeInputActor('+i+')" title="移除">✕</button>'
      + '<img class="player-avatar" src="'+actor.avatar+'" onerror="this.src=\''+DEFAULT_AVATAR+'\'">'
      + '<div class="player-name" id="pname-'+i+'">'+actor.name+'</div>'
      + '<div class="input-group"><label>K</label><input type="number" class="k" min="0" placeholder="击杀" oninput="onPlayerInput('+i+')"></div>'
      + '<div class="input-group"><label>D</label><input type="number" class="d" min="0" placeholder="死亡" oninput="onPlayerInput('+i+')"></div>'
      + '<div class="input-group"><label>RT</label><input type="text" class="rtxt" placeholder="手动输入RT"></div>'
      + '<div class="input-group"><label>ADR</label><input type="number" class="adr" min="0" step="0.1" placeholder="ADR"></div>'
      + '</div>';
  }).join('');
  /* bind name display update */
  inputActors.forEach(function(actor,i){
    let nmEl = document.getElementById('pname-'+i);
    if(nmEl && actor.name) nmEl.textContent = actor.name;
  });
  document.getElementById('inputInfo').textContent = '录入' + inputActors.length + '人，无需录入的右上角点"✕"去掉';
}

function onPlayerInput(idx){
  /* 仅同步 name 显示，不再自动计算 RT */
  let card = document.querySelectorAll('.player-card')[idx];
  if(!card) return;
  let nmEl = document.getElementById('pname-'+idx);
  let name = inputActors[idx]?.name||'';
  if(nmEl && name) nmEl.textContent = name;
}

function removeInputActor(i){
  if(inputActors.length<=1){ toast('⚠️ 至少保留1名演员'); return; }
  inputActors.splice(i,1);
  renderInputs();
}
window.removeInputActor = removeInputActor;

/* ===== SUBMIT ===== */
async function addRound(){
  if(!curEd){ toast('⚠️ 请先创建届次'); return; }
  let result = document.getElementById('roundResult').value;
  let row=[], has=false;
  document.querySelectorAll('#playerInputs .player-card').forEach(function(card,i){
    let k=+card.querySelector('.k').value||0;
    let d=+card.querySelector('.d').value||0;
    let a=+card.querySelector('.a').value||0;
    let rtInput=card.querySelector('.rtxt').value;
    let rt=(rtInput && rtInput!=='-') ? parseFloat(rtInput) : calcRT(k,d);
    let adr=parseFloat(card.querySelector('.adr').value)||0;
    let name=inputActors[i]?.name||'?';
    if(k||d||adr) has=true;
    row.push({k:k,d:d,rt:rt,adr:adr,name:name});
  });
  if(!has){ toast('⚠️ 请填写数据'); return; }
  let payload = {data:row, edition_id:curEd.id};
  if(result) payload.result = result;
  let r = await sb.from('rounds').insert([payload]).select();
  if(r.error){ toast('❌ 提交失败：'+r.error.message); return; }
  let insertedResult = r.data[0].result || result;
  rounds.push({id:r.data[0].id, data:row, created_at:r.data[0].created_at, result:insertedResult});
  renderAll();
  document.querySelectorAll('#playerInputs .k,.d,.adr').forEach(function(i){ i.value=''; });
  document.querySelectorAll('#playerInputs .rtxt').forEach(function(i){ i.value='-'; });
  document.getElementById('roundResult').value='';
  document.getElementById('lastUpdate').textContent = '最后更新 '+new Date().toLocaleTimeString('zh-CN');
  toast('✅ 本局已记录！');
}
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('addBtn').onclick = addRound;
  document.getElementById('clearBtn').onclick = clearAll;
});

async function clearAll(){
  if(!confirm('清空全部数据？不可撤销！')) return;
  if(!confirm('再次确认？')) return;
  if(!rounds.length) return;
  let ids = rounds.map(function(rd){ return rd.id; });
  let r = await sb.from('rounds').delete().in('id',ids);
  if(r.error){ toast('❌ 清空失败'); return; }
  rounds=[];
  renderAll();
  toast('🗑️ 已全部清空');
}

/* ===== RENDER ALL ===== */
function renderAll(){
  renderFilterBar();
  document.getElementById('roundCount').textContent = rounds.length;
  let wins=0, draws=0, loses=0;
  rounds.forEach(function(rd){
    if(rd.result==='win') wins++;
    else if(rd.result==='draw') draws++;
    else if(rd.result==='lose') loses++;
  });
  document.getElementById('winCount').textContent = wins;
  document.getElementById('drawCount').textContent = draws;
  document.getElementById('loseCount').textContent = loses;
  renderRank();
  renderLogs();
  let ld = document.getElementById('loading');
  if(ld && rounds.length) ld.style.display='none';
}

/* ===== FILTER BAR ===== */
function renderFilterBar(){
  let bar = document.getElementById('filterBar');
  let hasDataActors = {};
  rounds.forEach(function(rd){
    (rd.data||[]).forEach(function(p){ if(p.name) hasDataActors[p.name]=true; });
  });
  let actorsWithData = Object.keys(hasDataActors);
  // 只显示有数据的演员名，不显示全部工会成员
  let showNames = actorsWithData;
  let html = '';
  for(let i=0; i<showNames.length; i++){
    let n = showNames[i];
    let active = (!filteredActors || filteredActors.indexOf(n)>=0);
    html += '<button class="filter-chip '+(active?'active':'')+'" onclick="toggleActorFilter(\''+n.replace(/'/g,'\\\'')+'\')">'+n+'</button>';
  }
  if(filteredActors && filteredActors.length < showNames.length){
    html += '<button class="filter-clear" onclick="clearActorFilter()">清除筛选</button>';
  }
  bar.innerHTML = html;
}

function toggleActorFilter(name){
  if(!filteredActors){
    filteredActors = [name];
  }else if(filteredActors.indexOf(name)>=0){
    filteredActors = filteredActors.filter(function(n){ return n!==name; });
    if(!filteredActors.length) filteredActors = null;
  }else{
    filteredActors.push(name);
  }
  renderAll();
}

function clearActorFilter(){ filteredActors = null; renderAll(); }

/* ===== RANK TABLE ===== */
function renderRank(){
  let tb = document.getElementById('rankBody');
  if(!rounds.length){ tb.innerHTML='<tr><td colspan="8" style="color:var(--muted);padding:20px;">暂无数据</td></tr>'; return; }
  let actorMap = {};
  rounds.forEach(function(rd){
    (rd.data||[]).forEach(function(p){
      let n = p.name || '?';
      if(!actorMap[n]) actorMap[n]={k:0,d:0,a:0,rt:0,adr:0,count:0};
      actorMap[n].k += p.k||0;
      actorMap[n].d += p.d||0;
      actorMap[n].a += p.a||0;
      actorMap[n].rt += p.rt||0;
      actorMap[n].adr += p.adr||0;
      actorMap[n].count++;
    });
  });
  let rank = [];
  for(let n in actorMap){
    let s = actorMap[n];
    rank.push({
      name:n,
      k:s.k, d:s.d, a:s.a,
      avgRt: s.count>0 ? (s.rt/s.count).toFixed(2) : '0.00',
      avgAdr: s.count>0 ? (s.adr/s.count).toFixed(1) : '0.0',
      count: s.count
    });
  }
  rank.sort(function(a,b){ return parseFloat(a.avgRt) - parseFloat(b.avgRt); });
  let maxRt = rank.length ? parseFloat(rank[rank.length-1].avgRt) : 0;
  let maxAdr = 0;
  for(let i=0;i<rank.length;i++){ let v=parseFloat(rank[i].avgAdr); if(v>maxAdr) maxAdr=v; }
  let html = '';
  rank.forEach(function(r,i){
    let isMaxRt = parseFloat(r.avgRt)===maxRt && maxRt>0;
    let isMaxAdr = parseFloat(r.avgAdr)===maxAdr && maxAdr>0;
    html += '<tr>'
      + '<td>'+(i+1)+'</td>'
      + '<td style="color:var(--teamA);font-weight:700;">'+r.name+'</td>'
      + '<td>'+r.k+'</td><td>'+r.d+'</td><td>'+r.a+'</td>'
      + '<td class="avg-adr">'+r.avgAdr+(isMaxAdr?' 🏆':'')+'</td>'
      + '<td class="avg-rt">'+r.avgRt+(isMaxRt?' 🏆':'')+'</td>'
      + '<td>'+r.count+'</td>'
      + '</tr>';
  });
  tb.innerHTML = html;
}

/* ===== ROUND LOGS ===== */
function renderLogs(){
  let c = document.getElementById('roundsList');
  if(!rounds.length){ c.innerHTML = '<div class="empty-state">暂无对局记录，录入第一局吧！</div>'; return; }
  let sorted = rounds.slice().reverse().filter(function(rd){
    if(!filteredActors) return true;
    return (rd.data||[]).some(function(p){ return filteredActors.indexOf(p.name||'')>=0; });
  });
  let html = '';
  sorted.forEach(function(rd,revIdx){
    let realIdx = rounds.length - revIdx;
    let result = rd.result || '';
    let resultClass = result==='win'?'win':result==='lose'?'lose':'draw';
    let resultText = result==='win'?'胜':result==='lose'?'负':'平';
    let time = rd.created_at ? new Date(rd.created_at).toLocaleString('zh-CN') : '';
    let playersToShow = filteredActors
      ? (rd.data||[]).filter(function(p){ return filteredActors.indexOf(p.name||'')>=0; })
      : (rd.data||[]);
    let maxRT = 0, maxADR = 0;
    playersToShow.forEach(function(p){ if((p.rt||0)>maxRT) maxRT=p.rt||0; if((p.adr||0)>maxADR) maxADR=p.adr||0; });
    let gridHtml = '';
    playersToShow.forEach(function(p){
      let rtStr = p.rt||0;
      let adrStr = p.adr ? '<div class="cell-adr">ADR: '+p.adr+(p.adr===maxADR&&maxADR>0?' 🏆':'')+'</div>' : '';
      gridHtml += '<div>'
        + '<div class="cell-name">'+(p.name||'?')+'</div>'
        + '<div class="cell-kda">'+p.k+'/'+p.d+'/'+p.a+'</div>'
        + '<div class="cell-rt">RT: '+rtStr+(p.rt===maxRT&&maxRT>0?' 🏆':'')+'</div>'
        + adrStr
        + '</div>';
    });
    html += '<div class="round-item">'
      + '<div class="round-header">'
      + '<span class="round-title">第'+realIdx+'局 · '+time+'</span>'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      + '<span class="win-badge '+resultClass+'">'+resultText+'</span>'
      + '<button class="round-del" onclick="deleteRound('+rd.id+')">🗑️</button>'
      + '</div>'
      + '</div>'
      + '<div class="round-grid">'+gridHtml+'</div>'
      + '</div>';
  });
  c.innerHTML = html;
}

/* ===== DELETE ROUND ===== */
async function deleteRound(id){
  if(!confirm('确认删除本局记录？')) return;
  let r = await sb.from('rounds').delete().eq('id',id);
  if(r.error){ toast('❌ 删除失败：'+r.error.message); return; }
  rounds = rounds.filter(function(rd){ return rd.id!==id; });
  renderAll();
  toast('🗑️ 已删除');
}

/* ===== TOAST ===== */
function toast(msg){
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}

/* ===== INIT ===== */
(async function(){
  let ok = await initSB();
  if(ok){
    // 先加载工会成员
    try{
      let r = await sb.from('members').select('id,name,avatar');
      if(!r.error) allMembersForActor = r.data || [];
    }catch(e){}
    await loadEditions();
  }
})();
</script>
